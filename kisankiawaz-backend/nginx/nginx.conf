worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=20r/s;

    # ── Upstream services (8 existing + 4 new) ───────────────────
    upstream auth_service {
        server auth-service:8001;
    }
    upstream farmer_service {
        server farmer-service:8002;
    }
    upstream crop_service {
        server crop-service:8003;
    }
    upstream market_service {
        server market-service:8004;
    }
    upstream equipment_service {
        server equipment-service:8005;
    }
    upstream agent_service {
        server agent-service:8006;
    }
    upstream voice_service {
        server voice-service:8007;
    }
    upstream notification_service {
        server notification-service:8008;
    }
    # ── NEW services ──
    upstream schemes_service {
        server schemes-service:8009;
    }
    upstream geo_service {
        server geo-service:8010;
    }
    upstream admin_service {
        server admin-service:8011;
    }
    upstream analytics_service {
        server analytics-service:8012;
    }

    server {
        listen 8000;
        server_name _;

        # Health check
        location /health {
            return 200 '{"status":"healthy","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # ── Auth service ─────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Farmer service ───────────────────────────────────────
        location /api/v1/farmers/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://farmer_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Crop service ─────────────────────────────────────────
        location /api/v1/crops/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://crop_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Market service ───────────────────────────────────────
        location /api/v1/market/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://market_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Equipment service ────────────────────────────────────
        location /api/v1/equipment/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://equipment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Agent service ────────────────────────────────────────
        location /api/v1/agent/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://agent_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Voice service ────────────────────────────────────────
        location /api/v1/voice/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://voice_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            client_max_body_size 20M;
        }

        # ── Notification service ─────────────────────────────────
        location /api/v1/notifications/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Schemes service (NEW) ────────────────────────────────
        location /api/v1/schemes/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://schemes_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Geo service (NEW) ────────────────────────────────────
        location /api/v1/geo/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://geo_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Admin service (NEW) ──────────────────────────────────
        location /api/v1/admin/ {
            limit_req zone=admin burst=20 nodelay;
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Analytics service (NEW) ──────────────────────────────
        location /api/v1/analytics/ {
            limit_req zone=admin burst=20 nodelay;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default - 404
        location / {
            return 404 '{"error":"Not Found","message":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
