worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Use Docker embedded DNS for runtime service-name resolution.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=20r/s;

    server {
        listen 8000;
        server_name _;

        set $auth_upstream auth-service:8001;
        set $farmer_upstream farmer-service:8002;
        set $crop_upstream crop-service:8003;
        set $market_upstream market-service:8004;
        set $equipment_upstream equipment-service:8005;
        set $agent_upstream agent-service:8006;
        set $voice_upstream voice-service:8007;
        set $notification_upstream notification-service:8008;
        set $schemes_upstream schemes-service:8009;
        set $geo_upstream geo-service:8010;
        set $admin_upstream admin-service:8011;
        set $analytics_upstream analytics-service:8012;

        # Health check
        location /health {
            return 200 '{"status":"healthy","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # ── Auth service ─────────────────────────────────────────
        location /api/v1/auth {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://$auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Farmer service ───────────────────────────────────────
        location /api/v1/farmers {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$farmer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Crop service ─────────────────────────────────────────
        location /api/v1/crops {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$crop_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Market service ───────────────────────────────────────
        location /api/v1/market {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$market_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Equipment service ────────────────────────────────────
        location /api/v1/equipment {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$equipment_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Agent service ────────────────────────────────────────
        location /api/v1/agent {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$agent_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Voice service ────────────────────────────────────────
        location /api/v1/voice {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://$voice_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            client_max_body_size 20M;
        }

        # ── Notification service ─────────────────────────────────
        location /api/v1/notifications {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$notification_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Schemes service (NEW) ────────────────────────────────
        location /api/v1/schemes {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$schemes_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Geo service (NEW) ────────────────────────────────────
        location /api/v1/geo {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://$geo_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Admin service (NEW) ──────────────────────────────────
        location /api/v1/admin {
            limit_req zone=admin burst=20 nodelay;
            proxy_pass http://$admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Analytics service (NEW) ──────────────────────────────
        location /api/v1/analytics {
            limit_req zone=admin burst=20 nodelay;
            proxy_pass http://$analytics_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
        }

        # Default - 404
        location / {
            return 404 '{"error":"Not Found","message":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
