services:
  # -- Infrastructure -------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -- Nginx API Gateway ----------------------------------------------
  gateway:
    build:
      context: ./kisankiawaz-backend/nginx
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      auth-service:
        condition: service_healthy
      farmer-service:
        condition: service_healthy
      crop-service:
        condition: service_healthy
      market-service:
        condition: service_healthy
      equipment-service:
        condition: service_healthy
      agent-service:
        condition: service_healthy
      voice-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      schemes-service:
        condition: service_healthy
      geo-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    restart: unless-stopped

  # -- Auth Service ---------------------------------------------------
  auth-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/auth/Dockerfile
    ports:
      - "127.0.0.1:8001:8001"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
      - ./kisankiawaz-backend/scripts:/app/scripts:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -- Farmer Service -------------------------------------------------
  farmer-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/farmer/Dockerfile
    ports:
      - "127.0.0.1:8002:8002"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -- Crop Service ---------------------------------------------------
  crop-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/crop/Dockerfile
    ports:
      - "127.0.0.1:8003:8003"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -- Market Service -------------------------------------------------
  # Provides aggregated weather intelligence and soil composition APIs.
  # Requires outbound internet access to Open-Meteo, NASA POWER, and SoilGrids.
  market-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/market/Dockerfile
    ports:
      - "127.0.0.1:8004:8004"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
      - market_documents:/app/scheme_documents
      - market_generated:/app/generated_documents
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # -- Equipment Service ----------------------------------------------
  equipment-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/equipment/Dockerfile
    ports:
      - "127.0.0.1:8005:8005"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -- Agent Service (ADK Multi-Agent) -------------------------------
  agent-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/agent/Dockerfile
    ports:
      - "127.0.0.1:8006:8006"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # -- Voice Service --------------------------------------------------
  voice-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/voice/Dockerfile
    ports:
      - "127.0.0.1:8007:8007"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
      agent-service:
        condition: service_healthy
    restart: unless-stopped

  # -- Notification Service ------------------------------------------
  notification-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/notification/Dockerfile
    ports:
      - "127.0.0.1:8008:8008"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -- Schemes Service ------------------------------------------------
  schemes-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/schemes/Dockerfile
    ports:
      - "127.0.0.1:8009:8009"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # -- Geo Service ----------------------------------------------------
  geo-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/geo/Dockerfile
    ports:
      - "127.0.0.1:8010:8010"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # -- Admin Service --------------------------------------------------
  admin-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/admin/Dockerfile
    ports:
      - "127.0.0.1:8011:8011"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -- Analytics Service ---------------------------------------------
  analytics-service:
    build:
      context: ./kisankiawaz-backend
      dockerfile: services/analytics/Dockerfile
    ports:
      - "127.0.0.1:8012:8012"
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -- Celery Worker --------------------------------------------------
  celery-worker:
    build:
      context: ./kisankiawaz-backend
      dockerfile: workers/Dockerfile
    env_file: ./kisankiawaz-backend/.env
    volumes:
      - ./kisankiawaz-backend/creds:/app/creds:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
  market_documents:
  market_generated:
